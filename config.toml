#
# Zabbix MCP Server Configuration
# Stack: zabbix-grafana-mcp-stack
#

[server]

# SSE transport — works with Claude Code, VS Code, Cursor, n8n.
# Switch to "http" if your client supports Streamable HTTP sessions.
transport = "sse"

# Bind to all interfaces so Docker can route external traffic in.
host = "0.0.0.0"

# MCP server port (container-internal). Mapped to host port 8001 in compose.
port = 8080

log_level = "info"

# In Docker, logs go to stdout/stderr — use: docker compose logs zabbix-mcp
# Uncomment to write to a file as well:
# log_file = "/var/log/zabbix-mcp/server.log"

# Reduce token usage: get methods return key fields only by default.
# The LLM can always request full output by passing output = "extend".
compact_output = true

# Max Zabbix API calls per minute per client session (0 = unlimited).
rate_limit = 300

# ---------------------------------------------------------------------------
# Admin Portal
# ---------------------------------------------------------------------------
[admin]
enabled = true

# Admin UI port (container-internal). Mapped to host port 9090 in compose.
port = 9090

# Admin users — manage via the portal on first access, or set manually:
# [admin.users.admin]
# password_hash = "scrypt:16384:8:1$<salt>$<hash>"
# role = "admin"     # admin | operator | viewer

# ---------------------------------------------------------------------------
# MCP Token Authentication
# ---------------------------------------------------------------------------
# Recommended when the MCP server is reachable from the network (0.0.0.0).
# Generate a token:
#   python3 -c "import secrets,hashlib; t='zmcp_'+secrets.token_hex(32); print(f'Token: {t}\nHash:  sha256:{hashlib.sha256(t.encode()).hexdigest()}')"
# Add the hash below and set the token in your client's Authorization header:
#   Authorization: Bearer zmcp_...
#
# [tokens.claude]
# name = "Claude Code"
# token_hash = "sha256:<paste-hash-here>"
# scopes = ["*"]
# read_only = true
#
# [tokens.vscode]
# name = "VS Code"
# token_hash = "sha256:<paste-hash-here>"
# scopes = ["monitoring", "alerts"]
# read_only = true

# ---------------------------------------------------------------------------
# Zabbix Server
# ---------------------------------------------------------------------------

[zabbix.production]

# Zabbix web UI container — this is where the JSON-RPC API is served.
url = "http://zabbix-web:8080"

# API token — set ZABBIX_TOKEN in .env, referenced here via env var.
api_token = "${ZABBIX_TOKEN}"

# Allow write operations. Set to true to block all writes.
read_only = false

# No TLS on the internal Docker network.
verify_ssl = false

# Uncomment if Zabbix version is newer than zabbix-utils has been tested with.
# skip_version_check = false

# ---------------------------------------------------------------------------
# Example: second Zabbix instance
# ---------------------------------------------------------------------------
# [zabbix.staging]
# url = "https://zabbix-staging.example.com"
# api_token = "${ZABBIX_STAGING_TOKEN}"
