apiVersion: 1

datasources:
  # Zabbix API datasource via alexanderzobnin-zabbix-app plugin.
  # GRAFANA_ZABBIX_PASSWORD must be set in the Grafana container env.
  - name: Zabbix
    type: alexanderzobnin-zabbix-datasource
    access: proxy
    url: http://zabbix-web:8080/api_jsonrpc.php
    jsonData:
      username: Admin
      trends: true
      trendsFrom: "168h"
      trendsRange: "168h"
      cacheTTL: "1h"
    secureJsonData:
      password: "${GRAFANA_ZABBIX_PASSWORD}"
    isDefault: true
    editable: true

  # Direct read-only PostgreSQL connection to the Zabbix database.
  # Used for custom SQL panels and TimescaleDB queries.
  # GRAFANA_RO_PASSWORD must be set in the Grafana container env.
  - name: Zabbix PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: grafana_ro
    jsonData:
      database: zabbix
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: "${GRAFANA_RO_PASSWORD}"
    editable: true
