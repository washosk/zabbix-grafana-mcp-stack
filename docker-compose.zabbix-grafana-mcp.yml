services:
  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:2.22.0-pg16
    container_name: zabbix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Passed to init-grafana.sh to create the Grafana DB and read-only user at first init
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-changeme-grafana-db-password}
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD:-changeme-grafana-ro-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-grafana.sh:/docker-entrypoint-initdb.d/01-grafana.sh:ro
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zabbix Server
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME:-Zabbix Server}
      ZBX_ENABLE_TIMESCALEDB: "true"
      # Cache tuning
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-128M}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-64M}
      ZBX_HISTORYINDEXCACHESIZE: ${ZBX_HISTORYINDEXCACHESIZE:-16M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-16M}
      ZBX_VALUECACHESIZE: ${ZBX_VALUECACHESIZE:-32M}
      # Workers
      ZBX_STARTPOLLERS: ${ZBX_STARTPOLLERS:-10}
      ZBX_STARTTRAPPERS: ${ZBX_STARTTRAPPERS:-5}
      ZBX_STARTPREPROCESSORS: ${ZBX_STARTPREPROCESSORS:-6}
      ZBX_STARTPINGERS: ${ZBX_STARTPINGERS:-4}
      ZBX_STARTDISCOVERERS: ${ZBX_STARTDISCOVERERS:-2}
      ZBX_STARTHTTPPOLLERS: ${ZBX_STARTHTTPPOLLERS:-2}
      # SNMP trapper (active when zabbix-snmptraps is running)
      ZBX_STARTSNMPTRAPPER: ${ZBX_STARTSNMPTRAPPER:-1}
      ZBX_SNMPTRAPPERFILE: /var/lib/zabbix/snmptraps/snmptraps.log
      # Java Gateway (active when zabbix-java-gateway is running)
      ZBX_JAVAGATEWAY: zabbix-java-gateway
      ZBX_JAVAGATEWAYPORT: "10052"
      ZBX_STARTJAVAPOLLERS: ${ZBX_STARTJAVAPOLLERS:-5}
      ZBX_TIMEOUT: ${ZBX_TIMEOUT:-10}
    ports:
      - "10051:10051"
    volumes:
      - snmptraps_data:/var/lib/zabbix/snmptraps
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10051 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Zabbix Web UI
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME:-Zabbix Server}
      PHP_TZ: ${TIMEZONE:-Europe/Madrid}
    ports:
      - "8080:8080"
    depends_on:
      - zabbix-server
      - postgres
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Zabbix plugin (installed at startup; the plugins/ provisioning entry enables it)
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
      # Passed to datasource provisioning YAML via Grafana env-var substitution
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD:-changeme-grafana-ro-password}
      GRAFANA_ZABBIX_PASSWORD: ${GRAFANA_ZABBIX_PASSWORD:-zabbix}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Java Gateway — JMX monitoring
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-7.0-latest
    container_name: zabbix-java-gateway
    restart: unless-stopped
    environment:
      ZBX_START_POLLERS: ${ZBX_JAVA_GATEWAY_POLLERS:-5}
      ZBX_TIMEOUT: ${ZBX_TIMEOUT:-10}
    ports:
      - "10052:10052"
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10052 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SNMP Traps — receives traps and writes to snmptraps.log shared with zabbix-server
  zabbix-snmptraps:
    image: zabbix/zabbix-snmptraps:alpine-7.0-latest
    container_name: zabbix-snmptraps
    restart: unless-stopped
    ports:
      - "${ZABBIX_SNMP_TRAP_PORT:-162}:1162/udp"
    volumes:
      - snmptraps_data:/var/lib/zabbix/snmptraps
      - ./config/snmptrapd.conf:/etc/snmp/snmptrapd.conf:ro
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x snmptrapd > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Backup — Alpine cron container, writes 7-day rolling SQL dumps to data/pg-backups/
  # Dumps config data only; skips history/event/trend tables (schema-only) to keep files small.
  # Trigger an immediate dump: docker compose exec zabbix-pg-backup /usr/local/bin/backup.sh
  zabbix-pg-backup:
    build: ./config/backup
    container_name: zabbix-pg-backup
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE:-Europe/Madrid}
      DBHOST: postgres
      DBPORT: "5432"
      DBNAME: zabbix
      DBUSER: zabbix
      DBPASS: ${POSTGRES_PASSWORD}
      DBSCHEMA: public
      OUTDIR: /backup
    volumes:
      - ./data/pg-backups:/backup
    networks:
      - zabbix-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  # Zabbix MCP Server
  # NOTE: Requires a real Zabbix API token — set ZABBIX_TOKEN in .env before starting.
  zabbix-mcp:
    build:
      context: .
      dockerfile: Dockerfile.zabbix-mcp
      args:
        BASE_IMAGE: ${ZABBIX_MCP_BASE_IMAGE:-python:3.12-alpine}
    container_name: zabbix-mcp
    restart: unless-stopped
    ports:
      - "8001:8080"   # MCP server (SSE: http://localhost:8001/sse)
      - "9090:9090"   # Admin portal: http://localhost:9090
    environment:
      ZABBIX_TOKEN: ${ZABBIX_TOKEN}
    volumes:
      - ./config.toml:/etc/zabbix-mcp/config.toml
    depends_on:
      - zabbix-web
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Grafana MCP Server
  # NOTE: Requires a real Grafana service account token — set GRAFANA_TOKEN in .env before starting.
  grafana-mcp:
    image: grafana/mcp-grafana:latest
    container_name: grafana-mcp
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_TOKEN}
    depends_on:
      - grafana
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  grafana_data:
  snmptraps_data:     # shared between zabbix-server and zabbix-snmptraps

networks:
  zabbix-net:
    driver: bridge
